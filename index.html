<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .attribution { position: absolute; right: 10px; bottom: 10px; font-size: 15px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="container">
    <main>
      <img class="main-img" src="assets/images/illustration-article.svg" alt="picture">

      <div class="card-content">
          <span class="sp-learning">learning</span><br>
          <span class="sp-publish">published 21 dec 2023</span>
          <h2 class="title">HTML & CSS foundations</h2>
          <p class="par">these languages are the backbone of every website, defining structure, content, and presentation</p>
          <div class="pic">
            <img src="assets/images/image-avatar.webp" alt="picture" width="30px"> <span class="george">greg hooper</span>
          </div>
      </div>
    </main>
      
      
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">islam bunwara</a>.
    </div>
  </div>
</body>
</html>
